name: Platform report
description: Tell us how pocket-watch works (or doesn't) on your platform
labels: ["platform"]
body:
  - type: markdown
    attributes:
      value: |
        Platform reports help us track cross-platform compatibility. Even "works fine" reports are useful.

  - type: input
    id: os
    attributes:
      label: Operating system + version
      placeholder: "macOS 14.6 / Ubuntu 24.04 / Fedora 40 / Windows 11 / WSL2 Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "Python 3.12.4"
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: "bash 5.2 / zsh 5.9 / PowerShell 7.4"
    validations:
      required: false

  - type: dropdown
    id: status
    attributes:
      label: Overall status
      options:
        - Works fine
        - Works with caveats
        - Partially broken
        - Fully broken
    validations:
      required: true

  - type: textarea
    id: works
    attributes:
      label: What works
      placeholder: List features that work correctly
    validations:
      required: false

  - type: textarea
    id: broken
    attributes:
      label: What doesn't work
      placeholder: List features that fail, with the output you saw
    validations:
      required: false

  - type: textarea
    id: doctor
    attributes:
      label: pw doctor output
      description: Output of `/pw-doctor` (helpful even when everything works)
      render: shell
    validations:
      required: false
