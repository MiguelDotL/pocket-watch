name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: How should the feature work? CLI, hook, slash command, config option?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why this one is better
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Examples, prior art in other tools, links to relevant discussions
    validations:
      required: false
