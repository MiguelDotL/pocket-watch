repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^scripts/
        args: [--ignore-missing-imports]

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast subset)
        entry: pytest tests/ -x --no-cov -q
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: privacy-check
        name: privacy tell-word grep
        entry: make privacy-check
        language: system
        pass_filenames: false
        stages: [pre-commit]
